name: 🔨 Generate cards PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  generate:
    name: 🔨 Generate cards PDF
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r cards/requirements.txt

      - name: Generate cards PDFs
        run: |
          mkdir -p cards/output
          for file in cards/datasets/*.json; do
            name=$(basename "$file" .json)
            python cards/generate_cards.py "$file" --output "cards/output/${name}.pdf"
          done

      - name: Upload generated PDFs
        uses: actions/upload-artifact@v4
        with:
          name: cards
          path: cards/output/*.pdf
